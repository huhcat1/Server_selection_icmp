servers = {}  -- 登録済みサーバを保持

-- CSV ファイルのパス
local csv_path = "/usr/local/etc/dnsdist/rtt.csv"

-- control socket を有効化
controlSocket("127.0.0.1")
setKey("supersecret")

-- メンテナンス関数：CSV を読み込んでサーバ登録更新
function maintenance()
    local f = io.open(csv_path, "r")
    if not f then
        print(string.format("[%s] CSV file not found: %s", os.date(), csv_path))
        return
    end

    local header = f:read("*l")  -- ヘッダー行をスキップ

    -- 既存サーバを一旦削除
    for name, srv in pairs(servers) do
        removeServer(srv)
    end
    servers = {}

    -- CSV を読み込んで weight=0 のサーバのみ登録
    for line in f:lines() do
        local address, name, weight = line:match("([^,]+),([^,]+),([^,]+)")
        if address and name and tonumber(weight) == 0 then
            local srv = newServer({address=address, name=name, weight=10})
            servers[name] = srv
            print(string.format("[%s] Registered server %s (%s)", os.date(), name, address))
        else
            print(string.format("[%s] Skipped server %s (weight=%s)",
                os.date(), name or "nil", weight or "nil"))
        end
    end

    f:close()
end

-- dnsdist 起動時に一度だけ実行
maintenance()

-- サーバ選択ポリシー（重みに基づきランダム選択）
setServerPolicy(wrandom)

-- 待ち受けポート設定
setLocal('0.0.0.0:53')

-- クエリログ（最小構成）
local logfile = io.open("/usr/local/etc/dnsdist/dnsdist.log", "a")
if not logfile then
    print("ログファイルを開けませんでした")
end


last_maintenance = 0
interval = 60  -- 秒

addAction(AllRule(), LuaAction(function(dq)
    local now = os.time()
    if now - last_maintenance >= interval then
        maintenance()
        last_maintenance = now
    end
    return DNSAction.None
end))
